<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Nessa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        .name-container {
            display: flex;
            gap: 15px;
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }
        .name-container span {
            transition: 0.3s ease;
            cursor: default;
            color: rgba(255, 255, 255, 0.1); /* Warna teks redup */
        }
        /* Efek hover menyala warna ungu */
        .name-container span:hover {
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #d8b4e2, 0 0 40px #8a2be2, 0 0 80px #8a2be2;
        }
        .message {
            font-size: 1.2rem;
            margin-bottom: 40px;
            text-align: center;
            opacity: 0.8;
        }
        .btn {
            padding: 12px 25px;
            background-color: transparent;
            color: white;
            border: 1px solid #8a2be2;
            border-radius: 20px;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #8a2be2;
            box-shadow: 0 0 15px #8a2be2;
            color: white;
        }
    </style>
</head>
<body>
    <div class="name-container">
        <span>N</span><span>E</span><span>S</span><span>S</span><span>A</span>
    </div>
    <div class="message">
        Nih Untukmu Cihuyy ❤
    </div>
    <a href="flower.html" class="btn">Klik dong</a>
</body>
</html>
