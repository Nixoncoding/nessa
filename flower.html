<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunga Ungu Untuk Nessa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: default;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Latar belakang malam hari */
        .night {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
        }
        
        /* Efek bintang/partikel di background */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 3s infinite alternate;
            opacity: 0.4;
        }

        /* Pesan Penyemangat yang Gemes */
        .sweet-message {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.6;
            text-shadow: 0 0 10px #d8b4e2, 0 0 20px #8a2be2;
            opacity: 0; /* Tersembunyi di awal */
            z-index: 20;
            width: 85%;
            max-width: 500px;
            pointer-events: none;
            transition: opacity 2.5s ease-in-out; /* Efek muncul perlahan */
        }

        .sweet-message.show {
            opacity: 1; /* Muncul saat class 'show' ditambahkan */
        }

        /* Tangkai Bunga */
        .stem {
            position: absolute;
            bottom: 0;
            left: 50%;
            margin-left: -4px;
            width: 8px;
            height: 300px;
            background: linear-gradient(to top, #0f5132, #2d6a4f);
            border-radius: 10px;
            animation: growStem 2s ease-out forwards;
            transform-origin: bottom center;
            z-index: 1;
        }

        /* Kepala Bunga */
        .flower-head {
            position: absolute;
            bottom: 300px; 
            left: 50%;
            width: 0;
            height: 0;
            opacity: 0;
            animation: bloom 2s ease-out 1.8s forwards; 
            z-index: 10;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .flower-head:active {
            transform: scale(0.9);
        }

        .flower-head:hover .center {
            box-shadow: 0 0 40px #ffd700, 0 0 60px #fff;
        }

        /* Desain Kelopak Bunga Ungu */
        .petal {
            position: absolute;
            bottom: 0;
            left: -17.5px;
            width: 35px;
            height: 110px;
            background: linear-gradient(to bottom, #d8b4e2, #8a2be2);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
            transform-origin: bottom center;
            mix-blend-mode: screen;
        }

        .petal-1 { transform: rotate(0deg); }
        .petal-2 { transform: rotate(45deg); }
        .petal-3 { transform: rotate(90deg); }
        .petal-4 { transform: rotate(135deg); }
        .petal-5 { transform: rotate(180deg); }
        .petal-6 { transform: rotate(225deg); }
        .petal-7 { transform: rotate(270deg); }
        .petal-8 { transform: rotate(315deg); }

        /* Pusat Bunga Kuning */
        .center {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #fffacd, #ffd700);
            border-radius: 50%;
            box-shadow: 0 0 20px #ffd700;
            z-index: 10;
            transition: 0.3s;
        }

        /* Gaya Animasi Hati */
        .heart {
            position: absolute;
            color: #ff66b2;
            font-size: 20px;
            opacity: 0;
            z-index: 5;
            animation: floatUp 4s ease-in forwards;
            pointer-events: none;
        }

        /* Animasi Keyframes */
        @keyframes growStem {
            0% { transform: scaleY(0); }
            100% { transform: scaleY(1); }
        }

        @keyframes bloom {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 0.6; }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-400px) scale(1.5) rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="night">
        <div class="stars"></div>
    </div>
    
    <audio id="myAudio" src="BTS-Euphoria-(HipHopKit.com).mp3"></audio>

    <div class="sweet-message" id="messageBox">
        Hai Nessa! ✨<br><br>
        Semangat terus ya harinya! Walaupun kamu pasti cape <i>CIHUY</i>, aku bakal terus buat kamu semangat <i>CIHUY</i>, hehe.<br><br>
        Semoga bunga sama lagu ini bisa ngilangin capek kamu hari ini. <i>I love you to the moon and back!</i> 
    </div>

    <div class="stem"></div>
    <div class="flower-head" id="flower">
        <div class="petal petal-1"></div>
        <div class="petal petal-2"></div>
        <div class="petal petal-3"></div>
        <div class="petal petal-4"></div>
        <div class="petal petal-5"></div>
        <div class="petal petal-6"></div>
        <div class="petal petal-7"></div>
        <div class="petal petal-8"></div>
        <div class="center"></div>
    </div>

    <script>
        const flower = document.getElementById('flower');
        const audio = document.getElementById('myAudio');
        const messageBox = document.getElementById('messageBox');
        let isPlaying = false;
        let isFirstPlay = true; // Tambahan penanda untuk klik pertama

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤';

            const randomX = (Math.random() - 0.5) * 200; 
            heart.style.left = `calc(50% + ${randomX}px)`;
            heart.style.bottom = '250px'; 
            
            const randomSize = Math.random() * 15 + 15;
            heart.style.fontSize = `${randomSize}px`;

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        flower.addEventListener('click', () => {
            if (!isPlaying) {
                // Atur waktu mulai ke 2:45 (165 detik) khusus pada pemutaran pertama
                if (isFirstPlay) {
                    audio.currentTime = 165; 
                    isFirstPlay = false;
                }
                
                audio.play();
                isPlaying = true;
                
                messageBox.classList.add('show');
                
                for(let i=0; i<10; i++) {
                    setTimeout(createHeart, i * 100);
                }
            } else {
                audio.pause();
                isPlaying = false;
            }
        });

        setTimeout(() => {
            setInterval(createHeart, 800);
        }, 2000);
    </script>

    
</body>
</html>
