<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunga Ungu Untuk Nessa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* Latar belakang malam hari */
        .night {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
        }
        
        /* Efek bintang/partikel di background */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 3s infinite alternate;
            opacity: 0.4;
        }

        /* Tangkai Bunga */
        .stem {
            position: absolute;
            bottom: 0;
            left: 50%;
            margin-left: -4px; /* Setengah dari lebar tangkai agar persis di tengah */
            width: 8px;
            height: 300px;
            background: linear-gradient(to top, #0f5132, #2d6a4f);
            border-radius: 10px;
            animation: growStem 2s ease-out forwards;
            transform-origin: bottom center;
        }

        /* Kepala Bunga (Titik pusat presisi) */
        .flower-head {
            position: absolute;
            bottom: 300px; /* Persis di ujung atas tangkai */
            left: 50%;
            width: 0;
            height: 0;
            opacity: 0;
            animation: bloom 2s ease-out 1.8s forwards; /* Mekar setelah tangkai selesai */
            z-index: 2;
        }

        /* Desain Kelopak Bunga Ungu */
        .petal {
            position: absolute;
            bottom: 0; /* Dasar kelopak menyentuh titik pusat (0,0) */
            left: -17.5px; /* Geser ke kiri setengah dari lebar (35/2) agar tengah */
            width: 35px;
            height: 110px;
            background: linear-gradient(to bottom, #d8b4e2, #8a2be2);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
            transform-origin: bottom center;
            mix-blend-mode: screen;
        }

        /* Rotasi Kelopak (tanpa translateY agar tidak terpisah) */
        .petal-1 { transform: rotate(0deg); }
        .petal-2 { transform: rotate(45deg); }
        .petal-3 { transform: rotate(90deg); }
        .petal-4 { transform: rotate(135deg); }
        .petal-5 { transform: rotate(180deg); }
        .petal-6 { transform: rotate(225deg); }
        .petal-7 { transform: rotate(270deg); }
        .petal-8 { transform: rotate(315deg); }

        /* Pusat Bunga Kuning */
        .center {
            position: absolute;
            top: -20px; /* Geser ke atas setengah dari tinggi */
            left: -20px; /* Geser ke kiri setengah dari lebar */
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #fffacd, #ffd700);
            border-radius: 50%;
            box-shadow: 0 0 20px #ffd700;
            z-index: 10;
        }

        /* Animasi Keyframes */
        @keyframes growStem {
            0% { transform: scaleY(0); }
            100% { transform: scaleY(1); }
        }

        @keyframes bloom {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="night">
        <div class="stars"></div>
    </div>
    
    <div class="stem"></div>
    <div class="flower-head">
        <div class="petal petal-1"></div>
        <div class="petal petal-2"></div>
        <div class="petal petal-3"></div>
        <div class="petal petal-4"></div>
        <div class="petal petal-5"></div>
        <div class="petal petal-6"></div>
        <div class="petal petal-7"></div>
        <div class="petal petal-8"></div>
        <div class="center"></div>
    </div>
</body>
</html>
