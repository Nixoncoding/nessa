<!DOCTYPE html> <html lang="id"> <head> <meta charset="UTF-8"> <title>Flower for You</title> <style> body { background: #000; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; } .flower { position: relative; animation: grow 4s ease-out forwards; } .petal { position: absolute; width: 50px; height: 120px; background: rgba(255, 0, 119, 0.4); border-radius: 50%; bottom: 0; left: -25px; transform-origin: bottom center; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 20px rgba(255, 0, 119, 0.5); } .leaf { position: absolute; width: 30px; height: 80px; background: rgba(0, 255, 100, 0.4); border-radius: 50%; bottom: -40px; transform-origin: top center; box-shadow: 0 0 15px rgba(0, 255, 100, 0.3); } @keyframes grow { from { transform: scale(0) rotate(0deg); opacity: 0; } to { transform: scale(1.5) rotate(360deg); opacity: 1; } } .p1 { transform: rotate(0deg); } .p2 { transform: rotate(45deg); } .p3 { transform: rotate(90deg); } .p4 { transform: rotate(135deg); } .p5 { transform: rotate(180deg); } .p6 { transform: rotate(225deg); } .p7 { transform: rotate(270deg); } .p8 { transform: rotate(315deg); } .stem { width: 6px; height: 200px; background: linear-gradient(#222, #050); position: absolute; bottom: -200px; left: -3px; border-radius: 5px; } </style> </head> <body> <div class="flower"> <div class="stem"></div> <div class="petal p1"></div><div class="petal p2"></div> <div class="petal p3"></div><div class="petal p4"></div> <div class="petal p5"></div><div class="petal p6"></div> <div class="petal p7"></div><div class="petal p8"></div> <div class="leaf" style="left: -40px; transform: rotate(-45deg);"></div> <div class="leaf" style="left: 10px; transform: rotate(45deg);"></div> </div> </body> </html>
